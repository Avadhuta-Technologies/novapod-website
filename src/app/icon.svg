<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf1ff"/>
    </linearGradient>
    <linearGradient id="t" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c8d9ff"/>
      <stop offset="1" stop-color="#7ea4fb"/>
    </linearGradient>
    <linearGradient id="l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f6bf6"/>
      <stop offset="1" stop-color="#2546d6"/>
    </linearGradient>
    <linearGradient id="r" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#1f3fcf"/>
      <stop offset="1" stop-color="#1c63d4"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- contact shadow -->
  <ellipse cx="256" cy="412" rx="140" ry="30" fill="#1c3aa8" opacity="0.16" filter="url(#sh)"/>

  <g transform="translate(48 48) scale(6.5)" stroke="#14225f" stroke-width="0.4" stroke-opacity="0.18" stroke-linejoin="round">
    <!-- Back-center base cube -->
    <path d="M32 23 L44 29 L32 35 L20 29 Z" fill="url(#t)"/>
    <path d="M20 29 L32 35 L32 48 L20 42 Z" fill="url(#l)"/>
    <path d="M32 35 L44 29 L44 42 L32 48 Z" fill="url(#r)"/>
    <!-- Front-left base cube -->
    <path d="M20 29 L32 35 L20 41 L8 35 Z" fill="url(#t)"/>
    <path d="M8 35 L20 41 L20 54 L8 48 Z" fill="url(#l)"/>
    <path d="M20 41 L32 35 L32 48 L20 54 Z" fill="url(#r)"/>
    <!-- Front-right base cube -->
    <path d="M44 29 L56 35 L44 41 L32 35 Z" fill="url(#t)"/>
    <path d="M32 35 L44 41 L44 54 L32 48 Z" fill="url(#l)"/>
    <path d="M44 41 L56 35 L56 48 L44 54 Z" fill="url(#r)"/>
    <!-- Top cube (stacked on back-center) -->
    <path d="M32 10 L44 16 L32 22 L20 16 Z" fill="url(#t)"/>
    <path d="M20 16 L32 22 L32 35 L20 29 Z" fill="url(#l)"/>
    <path d="M32 22 L44 16 L44 29 L32 35 Z" fill="url(#r)"/>
  </g>
</svg>
